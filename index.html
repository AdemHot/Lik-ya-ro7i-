<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حبيبتي الغالية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* النجوم المتحركة */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .heart {
            font-size: 80px;
            color: #ff4757;
            animation: heartbeat 1.5s ease-in-out infinite;
            margin-bottom: 30px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        h1 {
            font-size: 3.5em;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        .love-message {
            font-size: 1.4em;
            font-weight: 300;
            color: white;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto 40px;
            animation: fadeInUp 1s ease-out 0.3s both;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .love-message p {
            margin-bottom: 25px;
        }

        .signature {
            font-size: 1.2em;
            color: rgba(255,255,255,0.9);
            font-weight: 400;
            animation: fadeInUp 1s ease-out 0.6s both;
            margin-top: 50px;
        }

        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .float-heart {
            position: absolute;
            color: #ff4757;
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* التصميم المتجاوب */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }
            
            .love-message {
                font-size: 1.2em;
            }
            
            .heart {
                font-size: 60px;
            }
        }

        /* تأثير الوميض */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- النجوم المتحركة -->
    <div class="stars" id="stars"></div>
    
    <!-- القلوب الطافية -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="container">
        <div class="heart">💖</div>
        
        <h1>يا حبيبتي الغالية</h1>
        
        <div class="love-message">
            <p>أنتِ النور اللي يضيء حياتي، والأمل اللي يعيش في قلبي ❤️</p>
            <p>كل لحظة معاكِ حلم حلو، وكل نظرة من عيونكِ تخليني أعيش من جديد 🌹</p>
            <p>بحبك أكثر من الكلام اللي يقدر يوصف، وأنتِ كل شيء بالنسبة لي ✨</p>
            <p>ستظلينِ ملكة قلبي إلى الأبد، يا أجمل هدية في حياتي 💕</p>
        </div>
        
        <div class="signature">
            الموقع مصنوع من <strong>adem chouk</strong> 💝
        </div>
    </div>

    <script>
        // إنشاء النجوم المتحركة
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // إنشاء القلوب الطافية
        function createFloatingHearts() {
            const heartsContainer = document.getElementById('floatingHearts');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'float-heart';
                heart.innerHTML = ['💖', '💕', '💗', '💝', '🌹'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heartsContainer.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }, 300);
        }

        // تشغيل التأثيرات
        window.addEventListener('load', () => {
            createStars();
            createFloatingHearts();
        });

        // تأثير الماوس
        document.addEventListener('mousemove', (e) => {
            const hearts = document.querySelectorAll('.float-heart');
            hearts.forEach(heart => {
                const rect = heart.getBoundingClientRect();
                const heartX = rect.left + rect.width / 2;
                const heartY = rect.top + rect.height / 2;
                const dx = e.clientX - heartX;
                const dy = e.clientY - heartY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    heart.style.transform = `translateY(-10px) scale(1.2)`;
                }
            });
        });
    </script>
</body>
</html>
